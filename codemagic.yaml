workflows:
  ios-unsigned-ipa:
    name: vxkit
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vxkit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 1.5 Patch Xcode pour désactiver la signature
        script: |
          PROJECT_FILE="ios/Runner.xcodeproj/project.pbxproj"

          echo "Patch du fichier Xcode pour bypass la signature..."

          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' "$PROJECT_FILE"

          if ! grep -q "CODE_SIGNING_ALLOWED" "$PROJECT_FILE"; then
            echo "Ajout des flags de désactivation..."
            sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER.*/&\
                CODE_SIGNING_ALLOWED = NO;\
                CODE_SIGNING_REQUIRED = NO;\
                CODE_SIGN_IDENTITY = "";/g' "$PROJECT_FILE"
          fi

          echo "Patch appliqué avec succès."

      - name: 2. Télécharger les dépendances
        script: flutter pub get

      - name: 3. Compiler iOS sans signature
        script: |
          echo "Compilation iOS sans signature..."
          flutter build ios --release --no-codesign

      - name: 4. Créer le fichier .ipa
        script: |
          echo "Création du fichier IPA..."
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r -q ../ipa/vxkit.ipa Payload

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
